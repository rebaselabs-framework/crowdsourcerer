[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "crowdsourcerer-sdk"
version = "0.1.0"
description = "Python SDK for the CrowdSorcerer AI task crowdsourcing platform"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "CrowdSorcerer", email = "sdk@crowdsourcerer.io" }]
keywords = ["crowdsourcing", "ai", "task-automation", "labeling", "data", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "mypy>=1.0",
    "ruff>=0.3",
]

[project.urls]
Homepage = "https://crowdsourcerer.rebaselabs.online"
Documentation = "https://crowdsourcerer.rebaselabs.online/docs"
Repository = "https://github.com/rebaselabs-framework/crowdsourcerer"
Issues = "https://github.com/rebaselabs-framework/crowdsourcerer/issues"

[tool.hatch.version]
path = "crowdsourcerer/__init__.py"

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
