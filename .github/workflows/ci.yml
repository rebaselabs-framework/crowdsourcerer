name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── API tests ────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crowdsourcerer_test
          POSTGRES_USER: cs
          POSTGRES_PASSWORD: cs_test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://cs:cs_test_pass@localhost:5432/crowdsourcerer_test
      JWT_SECRET: test_secret_key_for_ci_only
      REBASEKIT_API_KEY: test_key
      DEBUG: "true"
      TESTING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/api/requirements.txt') }}

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: apps/api
        run: alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        run: pytest tests/ -v --tb=short

  # ─── Python SDK tests ─────────────────────────────────────────────────────
  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK + dev deps
        working-directory: packages/python-sdk
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/python-sdk
        run: pytest tests/ -v

  # ─── TypeScript SDK build ─────────────────────────────────────────────────
  ts-sdk-build:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r type-check

  # ─── Web check + build ────────────────────────────────────────────────────
  # MANDATORY: astro check must pass (0 errors) AND pnpm build must succeed.
  # This is the authoritative gate — if this job fails, the commit is broken.
  # Never push to main without this job passing.
  web-build:
    name: Web Check + Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 1: astro check — catches TypeScript errors, bad imports, Astro 5 syntax issues.
      # Must produce: "0 errors". Any error here = broken deploy.
      - name: Astro type check (0 errors required)
        working-directory: apps/web
        run: |
          set -e
          OUTPUT=$(pnpm exec astro check 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qE "^[0-9]+ error"; then
            echo ""
            echo "❌ astro check reported errors — build blocked"
            exit 1
          fi
          if echo "$OUTPUT" | grep -qiE "error"; then
            # Confirm it's really 0 errors by checking the summary line
            if ! echo "$OUTPUT" | grep -qE "0 errors"; then
              echo ""
              echo "❌ astro check may have errors — review output above"
              exit 1
            fi
          fi
          echo "✅ astro check: 0 errors"
        env:
          PUBLIC_API_URL: http://localhost:8100

      # Step 2: full Astro build — catches compiler-level errors that astro check misses.
      # Must end with: "Complete!" — any build failure blocks deploy.
      - name: Astro build (must complete successfully)
        working-directory: apps/web
        run: |
          set -e
          pnpm build
          echo "✅ Astro build: Complete"
        env:
          PUBLIC_API_URL: http://localhost:8100
