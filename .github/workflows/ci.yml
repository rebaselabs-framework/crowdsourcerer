name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── API tests ────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests (Python)
    runs-on: ubuntu-latest

    # No Docker service container — uses the PostgreSQL pre-installed on the runner
    # image to avoid Docker Hub rate limiting on shared GitHub Actions IPs.

    env:
      DATABASE_URL: postgresql+asyncpg://cs:cs_test_pass@localhost:5432/crowdsourcerer_test
      JWT_SECRET: test_secret_key_for_ci_only
      REBASEKIT_API_KEY: test_key
      DEBUG: "true"
      TESTING: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Start PostgreSQL and create test database
        run: |
          # Ubuntu runners ship with PostgreSQL pre-installed; just start it.
          sudo systemctl start postgresql

          # Create the test role + database using the postgres superuser (peer auth via sudo).
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<-EOSQL
            CREATE USER cs WITH PASSWORD 'cs_test_pass';
            CREATE DATABASE crowdsourcerer_test OWNER cs;
            GRANT ALL PRIVILEGES ON DATABASE crowdsourcerer_test TO cs;
          EOSQL

          # Add a permissive pg_hba rule so asyncpg (TCP) can auth with password.
          # Prepend to ensure it takes priority over any existing host rules.
          PG_HBA=$(sudo -u postgres psql -tAc "SHOW hba_file")
          echo "host crowdsourcerer_test cs 127.0.0.1/32 md5" | sudo tee -a "$PG_HBA"
          echo "host crowdsourcerer_test cs ::1/128 md5" | sudo tee -a "$PG_HBA"
          sudo systemctl reload postgresql

          # Verify TCP connectivity before the tests run.
          pg_isready -h 127.0.0.1 -p 5432 -U cs -d crowdsourcerer_test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/api/requirements.txt') }}

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: apps/api
        run: alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        run: pytest tests/ -v --tb=short

  # ─── Python SDK tests ─────────────────────────────────────────────────────
  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK + dev deps
        working-directory: packages/python-sdk
        run: |
          pip install --upgrade pip hatchling
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/python-sdk
        run: pytest tests/ -v

  # ─── TypeScript SDK build ─────────────────────────────────────────────────
  ts-sdk-build:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r type-check

  # ─── Web check + build ────────────────────────────────────────────────────
  # MANDATORY: astro check must pass (0 errors) AND pnpm build must succeed.
  # This is the authoritative gate — if this job fails, the commit is broken.
  # Never push to main without this job passing.
  web-build:
    name: Web Check + Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build workspace packages first so @crowdsourcerer/types types are available
      - name: Build workspace packages
        run: pnpm -r --filter=!@crowdsourcerer/web build

      # Step 1: astro check — catches TypeScript errors, bad imports, Astro 5 syntax issues.
      # Must exit 0 (= no errors). Any error here = broken deploy.
      - name: Astro type check (0 errors required)
        working-directory: apps/web
        run: pnpm exec astro check
        env:
          PUBLIC_API_URL: http://localhost:8100

      # Step 2: full Astro build — catches compiler-level errors that astro check misses.
      # Must end with: "Complete!" — any build failure blocks deploy.
      - name: Astro build (must complete successfully)
        working-directory: apps/web
        run: |
          set -e
          pnpm build
          echo "✅ Astro build: Complete"
        env:
          PUBLIC_API_URL: http://localhost:8100
