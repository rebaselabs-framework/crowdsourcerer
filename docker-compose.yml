services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: crowdsourcerer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/crowdsourcerer
      REBASEKIT_API_KEY: ${REBASEKIT_API_KEY}
      REBASEKIT_BASE_URL: ${REBASEKIT_BASE_URL:-https://api.rebaselabs.online}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_SALT: ${API_KEY_SALT}
      DEBUG: ${DEBUG:-false}
      # Signup gating — closed by default until public launch. Flip to
      # "true" to re-open /v1/auth/register (and the Google OAuth new-user
      # branch). FREE_TIER_CREDITS controls the balance granted on signup.
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      FREE_TIER_CREDITS: ${FREE_TIER_CREDITS:-0}
      # Email notifications (optional — set EMAIL_ENABLED=true to activate)
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@crowdsourcerer.rebaselabs.online}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # Google OAuth (optional — enables "Sign in with Google" on login/register pages)
      # Create credentials at: https://console.cloud.google.com → APIs & Services → Credentials
      # Authorised redirect URI: https://crowdsourcerer.rebaselabs.online/v1/auth/google/callback
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # LLM provider — set one of the three API keys below to enable
      # llm_generate / data_transform / web_research task types. Leave
      # LLM_PROVIDER empty to auto-detect from whichever key is set, or
      # set it explicitly to 'anthropic' / 'gemini' / 'openai' to
      # disambiguate when multiple keys are configured.
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Sentry error tracking (optional — leave SENTRY_DSN empty to disable)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://api:8100}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4321/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
